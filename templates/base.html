<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Veza Abogados</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

.card-img-top{
height:250px;
object-fit:cover;
}

</style>

<style>
body{
    background-color: #f8f9fa;
}

.navbar-brand strong{
    font-size: 1.2rem;
}

.nav-link.btn{
    border-radius: 8px;
    font-weight: 500;
}

.card{
    border: none;
    border-radius: 15px;
    overflow: hidden;
}

.card-img-top{
    height: 250px;
    object-fit: cover;
}

.card:hover{
    transform: translateY(-5px);
    transition: 0.3s;
}

.btn{
    border-radius: 8px;
    font-weight: 500;
}

.page-header{
    background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
                url("{{ url_for('static', filename='img/banner_veza.jpg') }}");
    background-size: cover;
    background-position: center;
    color: white;
    padding: 70px 20px;
    text-align: center;
    border-radius: 15px;
    margin-top: 30px;
}

.section-box{
    background: white;
    border-radius: 15px;
    padding: 30px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
}
.form-control{
border-radius:8px;
}

.btn{
border-radius:8px;
font-weight:500;
}
</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand d-flex align-items-center" href="{{ url_for('home') }}">

<img src="{{ url_for('static', filename='img/logo_veza.jpg') }}" width="40" class="me-2">

<strong>Veza Abogados</strong>

</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">

<span class="navbar-toggler-icon"></span>

</button>

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="{{ url_for('home') }}">Inicio</a>
</li>

<li class="nav-item">
<a class="nav-link" href="{{ url_for('areas') }}">Áreas</a>
</li>

<li class="nav-item">
<a class="nav-link" href="{{ url_for('contacto') }}">Contacto</a>
</li>

<li class="nav-item">
<a class="nav-link btn btn-primary text-white ms-2 px-3" href="{{ url_for('auth.login') }}">
Ingresar
</a>
</li>

<li class="nav-item">
<a class="nav-link btn btn-success text-white ms-2 px-3" href="{{ url_for('auth.registro') }}">
Registrarse
</a>
</li>

</ul>

</div>

</div>

</nav>


<!-- CONTENIDO -->

{% block content %}
{% endblock %}


<!-- FOOTER -->

<footer class="bg-dark text-white text-center mt-5 p-4">

<p class="mb-1">© 2026 Veza Abogados S.A.C</p>

<p class="mb-1">Sistema Web de Portal de Clientes</p>

<p class="mb-0">Contacto: contacto@vezaabogados.com</p>

</footer>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
