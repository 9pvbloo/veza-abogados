<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Veza Abogados{% endblock %}</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- NAVBAR PÚBLICO -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Veza Abogados</a>

        <div>
            <a href="/" class="btn btn-outline-light me-2">Inicio</a>
            <a href="/areas" class="btn btn-outline-light me-2">Áreas</a>
            <a href="/contacto" class="btn btn-outline-light me-2">Contacto</a>
            <a href="/login" class="btn btn-outline-light me-2">Ingresar</a>
            <a href="/registro" class="btn btn-warning">Registrarse</a>
        </div>
    </div>
</nav>

<!-- CONTENIDO -->
{% block content %}
{% endblock %}

<!-- FOOTER -->
<footer class="bg-dark text-white text-center p-3 mt-5">
    © 2026 Veza Abogados S.A.C. - Todos los derechos reservados.
</footer>

</html>
