{% extends "base.html" %}

{% block content %}

<div class="container">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="section-box mt-5">

<h3 class="text-center mb-4 fw-bold">Registro de Cliente</h3>

<form method="POST" id="formRegistro">

<div class="mb-3">

<label class="form-label">RUC (opcional si es empresa)</label>

<input type="text"
name="ruc"
class="form-control"
maxlength="11"
pattern="\d{11}">

<small class="text-muted">
Solo si el cliente representa una empresa
</small>

</div>

<div class="mb-3">
<label class="form-label">Correo Electrónico</label>
<input type="email" name="email" id="email" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Contraseña</label>
<input type="password" name="password" id="password" class="form-control" required minlength="6">
</div>

<div class="mb-3">
<label class="form-label">DNI</label>
<input type="text" name="dni" class="form-control" required maxlength="8" pattern="\d{8}">
<small class="text-muted">Debe tener 8 dígitos</small>
</div>

<div class="mb-3">
<label class="form-label">Teléfono</label>
<input type="text" name="telefono" class="form-control" required pattern="\d{9}">
<small class="text-muted">Debe tener 9 dígitos</small>
</div>

<div class="mb-3">
<label class="form-label">Dirección</label>
<input type="text" name="direccion" class="form-control" required>
</div>

<div class="d-grid">
<button type="submit" class="btn btn-success">
Registrarse
</button>
</div>

</form>

<hr>

<p class="text-center mb-0">
¿Ya tienes cuenta?
<a href="{{ url_for('auth.login') }}">Inicia sesión</a>
</p>

</div>

</div>

</div>

</div>

{% endblock %}
